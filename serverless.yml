service: abby-chatbot

provider:
  name: aws
  runtime: python3.9
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  timeout: 30
  memorySize: 1024
  environment:
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}
    ABORTION_POLICY_API_KEY: ${env:ABORTION_POLICY_API_KEY}
    SESSION_SECRET: ${env:SESSION_SECRET}
    GOOGLE_MAPS_API_KEY: ${env:GOOGLE_MAPS_API_KEY}
    USE_CHEAP_CLASSIFIER: ${env:USE_CHEAP_CLASSIFIER, 'true'}
    EVALUATION_FREQUENCY: ${env:EVALUATION_FREQUENCY, '20'}
    MONTHLY_TOKEN_BUDGET: ${env:MONTHLY_TOKEN_BUDGET, '1000000'}
    ENABLE_CACHING: ${env:ENABLE_CACHING, 'true'}
    EVALUATION_MODEL: ${env:EVALUATION_MODEL, 'local'}
    LOG_LEVEL: ${env:LOG_LEVEL, 'INFO'}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - s3:GetObject
        - s3:PutObject
        - s3:ListBucket
      Resource:
        - "arn:aws:s3:::${self:custom.bucket}/*"
        - "arn:aws:s3:::${self:custom.bucket}"
    - Effect: Allow
      Action:
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource:
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.conversationsTable}"
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.usersTable}"
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.feedbackTable}"

custom:
  bucket: abby-chatbot-data-${self:provider.stage}
  conversationsTable: abby-chatbot-conversations-${self:provider.stage}
  usersTable: abby-chatbot-users-${self:provider.stage}
  feedbackTable: abby-chatbot-feedback-${self:provider.stage}
  pythonRequirements:
    dockerizePip: true
    slim: true
    layer: true
    noDeploy:
      - pytorch
      - torch
      - numpy
      - pandas
      - scikit-learn
      - matplotlib
    useDownloadCache: true
    useStaticCache: true

package:
  individually: true
  patterns:
    - '!node_modules/**'
    - '!venv/**'
    - '!.venv/**'
    - '!__pycache__/**'
    - '!.git/**'
    - '!.DS_Store'
    - '!.env'
    - '!.env.example'
    - '!.ebextensions/**'
    - '!.gitignore'
    - '!*.pem'
    - '!*.zip'
    - '!.serverless/**'

functions:
  api:
    handler: lambda_handler.handler
    events:
      - http:
          path: /
          method: get
          cors: true
      - http:
          path: /api/chat
          method: post
          cors: true
      - http:
          path: /api/feedback
          method: post
          cors: true
      - http:
          path: /api/clear-history
          method: post
          cors: true
      - http:
          path: /health
          method: get
          cors: true
    layers:
      - { Ref: PythonRequirementsLambdaLayer }

resources:
  Resources:
    # S3 bucket for storing model files and data
    ChatbotBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucket}
    
    # DynamoDB tables
    ConversationsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.conversationsTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: conversation_id
            AttributeType: S
        KeySchema:
          - AttributeName: conversation_id
            KeyType: HASH
    
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.usersTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
    
    FeedbackTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.feedbackTable}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: feedback_id
            AttributeType: S
        KeySchema:
          - AttributeName: feedback_id
            KeyType: HASH

plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin 