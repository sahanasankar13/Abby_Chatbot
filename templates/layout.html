<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Reproductive Health</title>
    
    <!-- Bootstrap CSS with Replit theme -->
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Apple system font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% block content %}{% endblock %}
    
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Theme Toggle JS -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Always use light theme
            document.documentElement.setAttribute('data-bs-theme', 'light');
            localStorage.setItem('theme', 'light');
            
            // Add event listener to theme toggle links
            const themeToggles = document.querySelectorAll('.theme-toggle');
            themeToggles.forEach(toggle => {
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    toggleTheme();
                });
            });
        });

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            const themeToggles = document.querySelectorAll('.theme-toggle');
            const themeTextElements = document.querySelectorAll('.theme-text');
            
            themeToggles.forEach(toggle => {
                const iconElement = toggle.querySelector('i');
                if (iconElement) {
                    if (theme === 'dark') {
                        iconElement.className = 'fas fa-sun me-2';
                    } else {
                        iconElement.className = 'fas fa-moon me-2';
                    }
                }
            });
            
            themeTextElements.forEach(textElement => {
                if (theme === 'dark') {
                    textElement.textContent = 'Light Mode';
                } else {
                    textElement.textContent = 'Dark Mode';
                }
            });
        }
    </script>
    
    <!-- Custom JS -->
    {% block scripts %}{% endblock %}
</body>
</html>
